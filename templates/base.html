<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="KIKELarkanePFBLzcF0aISNEhTd52riFsXhIN1-a11Y" />
    <title>{% block title %}バイト計算ツール{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}時給・月収・年収・年収の壁などを計算できるツールサイトです。{% endblock %}">
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 920px;
            margin: 0 auto;
            padding: 24px;
            background: #f7f7f7;
            color: #222;
        }

        .container {
            background: #fff;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .nav-links {
            margin-bottom: 20px;
        }

        .nav-links a {
            color: #222;
            font-weight: bold;
            text-decoration: none;
            margin-right: 16px;
            display: inline-block;
            margin-bottom: 8px;
        }

        h1 {
            margin-top: 0;
            font-size: 28px;
            line-height: 1.4;
        }

        h2 {
            margin-top: 32px;
            margin-bottom: 12px;
            font-size: 22px;
            line-height: 1.5;
        }

        .sub {
            color: #555;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        form {
            display: grid;
            gap: 16px;
            margin-bottom: 24px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-weight: bold;
        }

        input {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 16px;
        }

        .hint {
            font-size: 13px;
            color: #666;
        }

        button {
            padding: 16px;
            border: none;
            border-radius: 10px;
            background: #222;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .error-box {
            margin-bottom: 20px;
            padding: 14px 16px;
            background: #ffe9e9;
            border: 1px solid #e3a8a8;
            border-radius: 12px;
            color: #8a1f1f;
        }

        .results {
            margin-top: 24px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        .card {
            background: #fafafa;
            border: 1px solid #e6e6e6;
            border-radius: 14px;
            padding: 16px;
        }

        .card h3 {
            margin: 0 0 8px;
            font-size: 16px;
            color: #444;
        }

        .big {
            font-size: 28px;
            font-weight: bold;
        }

        .highlight-card {
            background: #fffdf2;
            border: 2px solid #f0d98a;
        }

        .notice {
            margin-top: 20px;
            padding: 14px;
            background: #fff8e1;
            border: 1px solid #f0d98a;
            border-radius: 12px;
        }

        .notice h3 {
            margin-top: 0;
        }

        .summary {
            margin-bottom: 20px;
        }

        .summary-box {
            background: #fffdf2;
            border: 2px solid #f0d98a;
            border-radius: 14px;
            padding: 16px;
        }

        .summary-box h2 {
            margin-top: 0;
            font-size: 18px;
        }

        .annual {
            font-size: 32px;
            font-weight: bold;
        }

        .status {
            font-weight: bold;
            margin-bottom: 10px;
        }

        .ok {
            color: #1f7a1f;
        }

        .ng {
            color: #b00020;
        }

        ul {
            padding-left: 20px;
            margin-bottom: 0;
            line-height: 1.8;
        }

        .tools-list {
            margin-top: 28px;
            padding: 18px;
            background: #f5f5f5;
            border-radius: 12px;
        }

        .tools-list h3 {
            margin-top: 0;
        }

        .text-section {
            margin-top: 28px;
            line-height: 1.8;
            color: #333;
        }

        .text-section p {
            margin-bottom: 14px;
        }

        .footer-note {
            margin-top: 24px;
            font-size: 14px;
            color: #666;
            line-height: 1.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-links">
            <a href="/">バイト収入シミュレーター</a>
            <a href="/wall">年収の壁シミュレーター</a>
            <a href="/hourly-month">時給→月収計算</a>
            <a href="/annual-month">年収→月収計算</a>
        </div>

        {% block content %}{% endblock %}

        <div class="tools-list">
            <h3>ツール一覧</h3>
            <ul>
                <li><a href="/">バイト収入シミュレーター</a></li>
                <li><a href="/wall">年収の壁シミュレーター</a></li>
                <li><a href="/hourly-month">時給→月収計算</a></li>
                <li><a href="/annual-month">年収→月収計算</a></li>
            </ul>
        </div>

        <p class="footer-note">
            このツールは概算シミュレーターです。税金・社会保険・扶養判定は、
            年齢、学校区分、勤務先、他の所得、加入条件などで変わるため、
            最終確認は勤務先や公的機関の案内で行ってください。
        </p>
    </div>
</body>
</html>
